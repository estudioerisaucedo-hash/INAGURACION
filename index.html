<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmación de asistencia · Eri Saucedo Interiorismo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #F5EDE5; font-family: 'Open Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
    .card { background: #EDE0D6; border: 0.8px solid #C4AC9E; max-width: 480px; width: 100%; padding: 48px 40px; position: relative; }
    .card::before { content: ''; position: absolute; inset: 10px; border: 0.4px solid #C4AC9E; pointer-events: none; }
    .divider { width: 100%; height: 0.5px; background: #C4AC9E; margin: 20px 0; }
    .logo-space { width: 100px; height: 120px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
    .logo-space img { width: 100%; height: 100%; object-fit: contain; }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; letter-spacing: 7px; color: #4A3728; text-align: center; font-weight: 500; }
    .brand-sub { font-family: 'Open Sans', sans-serif; font-size: 9px; letter-spacing: 6px; color: #8B7055; text-align: center; font-weight: 300; margin-top: 6px; }
    .invite-text { font-family: 'Open Sans', sans-serif; font-size: 12px; color: #7A6555; text-align: center; line-height: 1.7; font-weight: 300; }
    .event-date { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #4A3728; text-align: center; letter-spacing: 2px; }
    .event-detail { font-family: 'Open Sans', sans-serif; font-size: 11px; color: #8B7055; text-align: center; font-weight: 300; margin-top: 4px; line-height: 1.8; }
    .form-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: #4A3728; text-align: center; font-style: italic; margin-bottom: 24px; }
    .field-label { font-family: 'Open Sans', sans-serif; font-size: 10px; letter-spacing: 2px; color: #8B7055; margin-bottom: 8px; display: block; font-weight: 400; }
    .field-group { margin-bottom: 20px; }
    input[type="text"], input[type="number"] { width: 100%; background: transparent; border: none; border-bottom: 0.8px solid #C4AC9E; padding: 8px 0; font-family: 'Open Sans', sans-serif; font-size: 13px; color: #4A3728; outline: none; font-weight: 300; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn { background: transparent; border: 0.8px solid #C4AC9E; padding: 13px 20px; font-family: 'Open Sans', sans-serif; font-size: 12px; color: #7A6555; cursor: pointer; text-align: center; transition: all 0.2s; font-weight: 300; }
    .option-btn:hover { background: #D9C6B6; border-color: #8B7055; color: #4A3728; }
    .option-btn.selected { background: #8B7055; border-color: #8B7055; color: #F5EDE5; }
    .field-personas.hidden { display: none; }
    .btn-submit { width: 100%; background: #4A3728; border: none; padding: 15px; font-family: 'Open Sans', sans-serif; font-size: 11px; letter-spacing: 3px; color: #F5EDE5; cursor: pointer; margin-top: 28px; transition: background 0.2s; font-weight: 300; }
    .btn-submit:hover { background: #8B7055; }
    .error-msg { font-family: 'Open Sans', sans-serif; font-size: 10px; color: #8B7055; text-align: center; margin-top: 10px; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-space"><img id="logo" alt="Eri Saucedo Interiorismo"></div>
  <div class="divider"></div>
  <p class="brand-name">ERI SAUCEDO</p>
  <p class="brand-sub">INTERIORISMO</p>
  <div class="divider"></div>
  <p class="invite-text">Te invitamos a la inauguración<br>de nuestro nuevo espacio</p>
  <div style="height:16px"></div>
  <p class="event-date">25 de junio</p>
  <p class="event-detail">a las 19:00 h<br>C/ Real, nº 29 derecha<br>Los Llanos de Aridane · La Palma</p>
  <div class="divider" style="margin-top:24px"></div>
  <p class="form-title">¿Nos confirmas tu asistencia?</p>
  <div class="field-group">
    <span class="field-label">CONFIRMACIÓN</span>
    <div class="options">
      <button class="option-btn" onclick="selectOption(this,0)">Sí, asistiré</button>
      <button class="option-btn" onclick="selectOption(this,1)">No podré ir</button>
      <button class="option-btn" onclick="selectOption(this,2)">Lo intentaré, pero aún no puedo confirmarlo</button>
    </div>
  </div>
  <div class="field-group field-personas" id="field-personas">
    <label class="field-label" for="personas">¿CUÁNTAS PERSONAS VENDRÉIS EN TOTAL?</label>
    <input type="number" id="personas" min="1" max="20" placeholder="Ej: 3">
  </div>
  <div class="field-group">
    <label class="field-label" for="nombre">TU NOMBRE</label>
    <input type="text" id="nombre" placeholder="Escribe tu nombre">
  </div>
  <p class="error-msg" id="error-msg"></p>
  <button class="btn-submit" onclick="enviar()">CONFIRMAR ASISTENCIA</button>
</div>

  const opciones = [
    "S\u00ed, asistir\u00e9",
    "No podr\u00e9 ir",
    "Lo intentar\u00e9, pero a\u00fan no puedo confirmarlo"
  ];

  let opcionElegida = -1;

  function selectOption(btn, idx) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    opcionElegida = idx;
    const fp = document.getElementById('field-personas');
    if (idx === 1) { fp.classList.add('hidden'); document.getElementById('personas').value = ''; }
    else { fp.classList.remove('hidden'); }
  }

  function enviar() {
    const nombre = document.getElementById('nombre').value.trim();
    const personas = document.getElementById('personas').value.trim();
    const errorMsg = document.getElementById('error-msg');
    if (opcionElegida === -1) { errorMsg.textContent = "Por favor, selecciona una opción."; errorMsg.style.display='block'; return; }
    if (!nombre) { errorMsg.textContent = "Por favor, escribe tu nombre."; errorMsg.style.display='block'; return; }
    if (opcionElegida !== 1 && !personas) { errorMsg.textContent = "Por favor, indica cuántas personas vendréis."; errorMsg.style.display='block'; return; }
    errorMsg.style.display = 'none';

    const asistenciaVal = encodeURIComponent(opciones[opcionElegida]);
    const nombreVal = encodeURIComponent(nombre);
    const personasVal = opcionElegida === 1 ? '0' : encodeURIComponent(personas);

    const url = "https://docs.google.com/forms/d/e/1FAIpQLSczafqFED2GnFK__csymT9hlJR55b7cAiCZoyynGpK4YHFQkQ/viewform?usp=pp_url"
      + "&entry.319367295=" + asistenciaVal
      + "&entry.1352147333=" + personasVal
      + "&entry.1470003701=" + nombreVal;

    window.location.href = url;
  }
